<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paced</title>
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@400,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0D1117;
  --bg2: #111827;
  --bg3: #1A2030;
  --teal: #1EB980;
  --teal-dim: #164E3A;
  --teal-faint: #0D2A1E;
  --ink: #F0F0F0;
  --ink2: #6B7A99;
  --ink3: #3D4450;
  --border: #1E2A3A;
  --purple: #A78BFA;
  --orange: #FB923C;
  --blue: #60A5FA;
  --red: #F87171;
  --yellow: #FBBF24;
  --pink: #F472B6;
}

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Satoshi', sans-serif;
  font-weight: 400;
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, h4 { font-family: 'Cabinet Grotesk', sans-serif; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
button:active { transform: scale(0.97); }
input, select, textarea { font-family: inherit; }

.app {
  max-width: 480px;
  margin: 0 auto;
  height: 100%;
  position: relative;
  overflow: hidden;
}

/* Screen transitions */
.screen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 20px 100px;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform, opacity;
}
.screen.hidden-right { transform: translateX(100%); opacity: 0; pointer-events: none; }
.screen.hidden-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
.screen.active { transform: translateX(0); opacity: 1; pointer-events: auto; }

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 32px; height: 32px;
  background: var(--teal);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--bg);
}
.wordmark { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: 20px; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink2);
  font-size: 20px;
  transition: color 0.15s;
}
.topbar-btn:hover { color: var(--ink); }
.avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--teal-dim);
  color: var(--teal);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cabinet Grotesk', sans-serif;
  font-weight: 700;
  font-size: 13px;
}

/* Date and heading */
.date-label { color: var(--ink2); font-size: 13px; margin-bottom: 4px; }
.main-heading { font-size: 32px; font-weight: 800; margin-bottom: 16px; }

/* Today summary card */
.summary-card {
  background: var(--bg2);
  border: 1px solid var(--teal-dim);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 20px;
}
.summary-top { display: flex; justify-content: space-between; margin-bottom: 14px; }
.summary-stat-label { font-size: 12px; color: var(--ink2); margin-bottom: 2px; }
.summary-stat-value { font-size: 22px; font-weight: 700; font-family: 'Cabinet Grotesk', sans-serif; }
.progress-bar {
  display: flex; gap: 4px; height: 8px; border-radius: 4px; overflow: hidden;
  margin-bottom: 8px;
}
.progress-seg {
  flex: 1; border-radius: 4px;
  background: var(--border);
  transition: background 0.3s;
}
.progress-seg.done { background: var(--teal); }
.summary-note { font-size: 12px; color: var(--ink2); }

/* Filter pills */
.filters { display: flex; gap: 8px; margin-bottom: 18px; }
.pill {
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--border);
  color: var(--ink2);
  transition: all 0.15s;
}
.pill.active {
  border-color: var(--teal);
  color: var(--teal);
  background: var(--teal-faint);
}

/* Task cards */
.task-list { display: flex; flex-direction: column; gap: 10px; }

.task-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s;
  animation: slideUp 0.3s ease-out;
}
.task-card:hover { border-color: var(--ink3); }
.task-card.complete { opacity: 0.5; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulseGreen {
  0% { box-shadow: 0 0 0 0 rgba(30,185,128,0.4); }
  70% { box-shadow: 0 0 0 10px rgba(30,185,128,0); }
  100% { box-shadow: 0 0 0 0 rgba(30,185,128,0); }
}

.task-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.subject-label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink2); }
.subject-dot { width: 8px; height: 8px; border-radius: 50%; }
.status-badge {
  font-size: 11px; font-weight: 500;
  padding: 3px 10px;
  border-radius: 10px;
}
.status-today { background: var(--teal-faint); color: var(--teal); }
.status-start { background: rgba(251,191,36,0.12); color: var(--yellow); }
.status-ontrack { background: rgba(96,165,250,0.12); color: var(--blue); }
.status-done { background: rgba(30,185,128,0.12); color: var(--teal); }
.status-overdue { background: rgba(248,113,113,0.12); color: var(--red); }

.task-title {
  font-family: 'Cabinet Grotesk', sans-serif;
  font-weight: 500;
  font-size: 16px;
  margin-bottom: 10px;
}

.task-meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--ink2); }
.meta-item i { font-size: 14px; }
.difficulty-dots { display: flex; gap: 3px; }
.diff-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink3); }
.diff-dot.filled { background: var(--teal); }

.task-chevron {
  float: right;
  margin-top: -30px;
  color: var(--ink3);
  font-size: 18px;
  transition: transform 0.25s;
}
.task-card.expanded .task-chevron { transform: rotate(90deg); }

/* Expanded content */
.task-expand {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.task-card.expanded .task-expand { max-height: 400px; }

.expand-inner { padding-top: 14px; border-top: 1px solid var(--border); margin-top: 14px; }
.task-desc { font-size: 13px; color: var(--ink2); margin-bottom: 14px; line-height: 1.5; }
.mini-stats { display: flex; gap: 8px; margin-bottom: 14px; }
.mini-stat {
  flex: 1;
  background: var(--bg3);
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}
.mini-stat-label { font-size: 10px; color: var(--ink2); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.mini-stat-value { font-size: 15px; font-weight: 700; font-family: 'Cabinet Grotesk', sans-serif; }

.btn-complete {
  width: 100%;
  padding: 12px;
  background: var(--teal);
  color: var(--bg);
  font-weight: 700;
  font-size: 14px;
  border-radius: 10px;
  transition: background 0.15s;
}
.btn-complete:hover { background: #25d993; }
.btn-complete:disabled { background: var(--ink3); cursor: default; }
.btn-complete:disabled:active { transform: none; }

/* Bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 10px 0 max(10px, env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-tab {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  font-size: 10px;
  color: var(--ink3);
  padding: 4px 0;
  transition: color 0.15s;
}
.nav-tab.active { color: var(--teal); }
.nav-tab i { font-size: 22px; }

/* FAB */
.fab {
  position: fixed;
  bottom: max(74px, calc(60px + env(safe-area-inset-bottom)));
  left: 50%;
  transform: translateX(calc(-50% + 200px));
  width: 52px; height: 52px;
  background: var(--teal);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: var(--bg);
  box-shadow: 0 4px 20px rgba(30,185,128,0.3);
  z-index: 101;
  transition: transform 0.15s, box-shadow 0.15s;
}
.fab:hover { box-shadow: 0 6px 28px rgba(30,185,128,0.45); }
.fab:active { transform: translateX(calc(-50% + 200px)) scale(0.93); }
.fab.hide { display: none; }

/* Add homework flow */
.flow-topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 0;
  position: sticky; top: 0; background: var(--bg); z-index: 10;
}
.back-btn { font-size: 22px; color: var(--ink2); }
.back-btn:hover { color: var(--ink); }

.step-indicator { display: flex; align-items: center; gap: 8px; flex: 1; }
.step-bar { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background 0.25s; }
.step-bar.done, .step-bar.active { background: var(--teal); }
.step-label { font-size: 12px; color: var(--ink2); white-space: nowrap; }

.flow-heading { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.flow-sub { font-size: 14px; color: var(--ink2); margin-bottom: 24px; }

/* Method cards */
.method-cards { display: flex; flex-direction: column; gap: 12px; }
.method-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  display: flex; align-items: flex-start; gap: 16px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.method-card:hover { border-color: var(--ink3); }
.method-card.primary { border-color: var(--teal-dim); }
.method-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.method-card.primary .method-icon { background: var(--teal-faint); color: var(--teal); }
.method-card:not(.primary) .method-icon { background: var(--bg3); color: var(--ink2); }
.method-info { flex: 1; }
.method-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.method-title { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 500; font-size: 16px; }
.fastest-badge {
  font-size: 10px; font-weight: 500;
  padding: 2px 8px;
  border-radius: 8px;
  background: var(--teal-faint);
  color: var(--teal);
}
.method-desc { font-size: 13px; color: var(--ink2); line-height: 1.4; }

/* Form */
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 13px; color: var(--ink2); margin-bottom: 6px; font-weight: 500; }
.form-input, .form-select {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--ink);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.form-input:focus, .form-select:focus { border-color: var(--teal); }
.form-select { cursor: pointer; }

.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--teal);
  color: var(--bg);
  font-weight: 700;
  font-size: 15px;
  border-radius: 12px;
  margin-top: 10px;
}
.btn-primary:hover { background: #25d993; }
.btn-primary:disabled { background: var(--ink3); cursor: default; }
.btn-primary:disabled:active { transform: none; }

/* Confirm step */
.confirm-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 20px;
}
.confirm-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.confirm-row:last-child { border-bottom: none; }
.confirm-key { font-size: 13px; color: var(--ink2); }
.confirm-val { font-size: 13px; font-weight: 500; }

.diff-selector { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.diff-btn {
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 13px; font-weight: 500;
  background: var(--bg2);
  border: 1px solid var(--border);
  transition: all 0.15s;
}
.diff-btn.active { border-color: var(--teal); background: var(--teal-faint); color: var(--teal); }

.schedule-preview {
  background: var(--teal-faint);
  border: 1px solid var(--teal-dim);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 20px;
}
.schedule-title { font-size: 13px; color: var(--teal); font-weight: 500; margin-bottom: 10px; }
.schedule-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
.schedule-row .label { color: var(--ink2); }

/* Success */
.success-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
.success-check {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: var(--teal-faint);
  color: var(--teal);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  margin-bottom: 20px;
}
.success-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.success-sub { font-size: 14px; color: var(--ink2); margin-bottom: 30px; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
  padding: 20px;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  max-width: 360px;
  width: 100%;
  text-align: center;
}
.modal-icon { font-size: 36px; color: var(--teal); margin-bottom: 12px; }
.modal h3 { font-size: 18px; margin-bottom: 8px; }
.modal p { font-size: 13px; color: var(--ink2); margin-bottom: 20px; line-height: 1.5; }
.modal-close {
  padding: 10px 24px;
  background: var(--bg3);
  border-radius: 10px;
  font-weight: 500;
  font-size: 14px;
}

/* Placeholder screen */
.placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; text-align: center;
}
.placeholder i { font-size: 48px; color: var(--ink3); margin-bottom: 16px; }
.placeholder h2 { font-size: 20px; margin-bottom: 6px; }
.placeholder p { font-size: 14px; color: var(--ink2); }

/* Task detail expand coloring per subject */
.diff-dot.filled.c-teal { background: var(--teal); }
.diff-dot.filled.c-purple { background: var(--purple); }
.diff-dot.filled.c-orange { background: var(--orange); }
.diff-dot.filled.c-blue { background: var(--blue); }
.diff-dot.filled.c-red { background: var(--red); }
.diff-dot.filled.c-yellow { background: var(--yellow); }
.diff-dot.filled.c-pink { background: var(--pink); }

/* Responsive */
@media (max-width: 480px) {
  .summary-top { flex-direction: column; gap: 10px; }
  .task-meta { gap: 10px; }
  .fab { transform: translateX(calc(50vw - 66px)); }
  .fab:active { transform: translateX(calc(50vw - 66px)) scale(0.93); }
}

/* Scrollbar */
.screen::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div class="app">
  <!-- Screen 1: Task List -->
  <div id="screen-tasks" class="screen active">
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo-icon"><i class="ti ti-clock-bolt"></i></div>
        <span class="wordmark">paced</span>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn"><i class="ti ti-bell"></i></button>
        <div class="avatar">AH</div>
      </div>
    </div>

    <div class="date-label" id="today-date"></div>
    <h1 class="main-heading">Today</h1>

    <div class="summary-card" id="summary-card"></div>

    <div class="filters">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="due-soon">Due soon</button>
      <button class="pill" data-filter="not-started">Not started</button>
    </div>

    <div class="task-list" id="task-list"></div>
  </div>

  <!-- Screen 2: Add Flow -->
  <div id="screen-add" class="screen hidden-right">
    <div class="flow-topbar">
      <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>
      <div class="step-indicator">
        <div class="step-bar" id="sb1"></div>
        <div class="step-bar" id="sb2"></div>
        <div class="step-bar" id="sb3"></div>
      </div>
      <span class="step-label" id="step-label">Step 1 of 3</span>
    </div>
    <div id="flow-content"></div>
  </div>

  <!-- Screen 3: Placeholder screens -->
  <div id="screen-calendar" class="screen hidden-right">
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo-icon"><i class="ti ti-clock-bolt"></i></div>
        <span class="wordmark">paced</span>
      </div>
    </div>
    <div class="placeholder">
      <i class="ti ti-calendar"></i>
      <h2>Calendar</h2>
      <p>Coming soon</p>
    </div>
  </div>
  <div id="screen-progress" class="screen hidden-right">
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo-icon"><i class="ti ti-clock-bolt"></i></div>
        <span class="wordmark">paced</span>
      </div>
    </div>
    <div class="placeholder">
      <i class="ti ti-chart-bar"></i>
      <h2>Progress</h2>
      <p>Coming soon</p>
    </div>
  </div>
  <div id="screen-settings" class="screen hidden-right">
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo-icon"><i class="ti ti-clock-bolt"></i></div>
        <span class="wordmark">paced</span>
      </div>
    </div>
    <div class="placeholder">
      <i class="ti ti-settings"></i>
      <h2>Settings</h2>
      <p>Coming soon</p>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-tab active" data-screen="tasks"><i class="ti ti-layout-list"></i>Tasks</button>
    <button class="nav-tab" data-screen="calendar"><i class="ti ti-calendar"></i>Calendar</button>
    <button class="nav-tab" data-screen="progress"><i class="ti ti-chart-bar"></i>Progress</button>
    <button class="nav-tab" data-screen="settings"><i class="ti ti-settings"></i>Settings</button>
  </nav>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="openAddFlow()"><i class="ti ti-plus"></i></button>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-icon"><i class="ti ti-camera"></i></div>
      <h3>Coming soon</h3>
      <p>Claude vision parsing will be added soon. You'll be able to paste or drag a Satchel One screenshot and Paced will read it for you.</p>
      <button class="modal-close" onclick="closeModal()">Got it</button>
    </div>
  </div>
</div>

<script>
const SUBJECT_COLORS = {
  'Sports Science': 'teal',
  'Maths': 'purple',
  'Physics': 'orange',
  'English': 'blue',
  'Chemistry': 'red',
  'Biology': 'yellow',
  'History': 'pink',
  'Geography': 'teal',
  'Computer Science': 'blue',
  'Art': 'orange',
};

const COLOR_MAP = {
  teal: 'var(--teal)', purple: 'var(--purple)', orange: 'var(--orange)',
  blue: 'var(--blue)', red: 'var(--red)', yellow: 'var(--yellow)', pink: 'var(--pink)',
};

const DIFFICULTY_LABELS = ['Easy','OK','Tricky','Hard','Brutal'];
const DIFFICULTY_MULT = [0.8, 1.0, 1.2, 1.5, 2.0];
const TIME_OPTIONS = [
  {label:'15 min',val:15},{label:'30 min',val:30},{label:'45 min',val:45},
  {label:'1 hour',val:60},{label:'1.5 hours',val:90},{label:'2 hours',val:120},
  {label:'2.5 hours',val:150},{label:'3 hours',val:180},{label:'3+ hours',val:210},
];

let tasks = [];
let currentFilter = 'all';
let expandedId = null;
let flowStep = 1;
let flowData = {};
let currentScreen = 'tasks';

function loadTasks() {
  const saved = localStorage.getItem('paced_tasks');
  if (saved) { tasks = JSON.parse(saved); return; }
  const today = new Date();
  const d = (off) => { const x = new Date(today); x.setDate(x.getDate() + off); return x.toISOString().split('T')[0]; };
  tasks = [
    { id: '1', subject: 'Sports Science', title: 'Coursework draft — Section A', desc: 'Write up the methodology section for the Sports Science coursework. Include references to at least three studies.', dueDate: d(5), estimate: 120, difficulty: 2, sessionsComplete: 2, createdDate: d(-3) },
    { id: '2', subject: 'Maths', title: 'Sparx Homework — Week 12', desc: 'Complete all assigned Sparx tasks for this week. Focus on algebraic fractions.', dueDate: d(3), estimate: 60, difficulty: 1, sessionsComplete: 0, createdDate: d(-1) },
    { id: '3', subject: 'Physics', title: 'Waves & Optics booklet pp.14–18', desc: 'Answer questions on refraction and diffraction. Show all working.', dueDate: d(7), estimate: 45, difficulty: 3, sessionsComplete: 1, createdDate: d(-2) },
  ];
  saveTasks();
}

function saveTasks() { localStorage.setItem('paced_tasks', JSON.stringify(tasks)); }

function getSubjectColor(subj) { return SUBJECT_COLORS[subj] || 'teal'; }

function calcSchedule(estimate, diffIdx, dueDate) {
  const total = Math.round(estimate * DIFFICULTY_MULT[diffIdx]);
  const sessions = Math.ceil(total / 25);
  const due = new Date(dueDate);
  const start = new Date(due);
  start.setDate(start.getDate() - (sessions + 1));
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0,0,0,0);
  if (start < tomorrow) start.setTime(tomorrow.getTime());
  return { totalMinutes: total, sessions, startDate: start };
}

function getTotalSessions(task) {
  return calcSchedule(task.estimate, task.difficulty, task.dueDate).sessions;
}

function isToday(dateStr) {
  return dateStr === new Date().toISOString().split('T')[0];
}

function getStatus(task) {
  const total = getTotalSessions(task);
  if (task.sessionsComplete >= total) return { text: 'Done', cls: 'status-done' };
  const sched = calcSchedule(task.estimate, task.difficulty, task.dueDate);
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(sched.startDate); start.setHours(0,0,0,0);
  const due = new Date(task.dueDate); due.setHours(0,0,0,0);
  if (today > due) return { text: 'Overdue', cls: 'status-overdue' };
  if (today >= start && today <= due) {
    const diffDays = Math.ceil((today - start) / 86400000);
    if (diffDays <= 1) return { text: 'Today', cls: 'status-today' };
    return { text: 'Today', cls: 'status-today' };
  }
  const daysUntilStart = Math.ceil((start - today) / 86400000);
  if (daysUntilStart <= 2) {
    const dayName = start.toLocaleDateString('en-GB', { weekday: 'short' });
    return { text: `Start by ${dayName}`, cls: 'status-start' };
  }
  return { text: 'On track', cls: 'status-ontrack' };
}

function isDueSoon(task) {
  const due = new Date(task.dueDate);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = (due - today) / 86400000;
  return diff <= 3 && task.sessionsComplete < getTotalSessions(task);
}

function isNotStarted(task) { return task.sessionsComplete === 0 && task.sessionsComplete < getTotalSessions(task); }

function formatDate(str) {
  const d = new Date(str);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function renderSummary() {
  const today = new Date().toISOString().split('T')[0];
  const todayTasks = tasks.filter(t => {
    const status = getStatus(t);
    return status.text === 'Today' || status.text === 'Overdue';
  });
  const totalTime = todayTasks.reduce((sum, t) => sum + 25, 0);
  const totalSessions = todayTasks.reduce((sum, t) => sum + getTotalSessions(t), 0);
  const doneSessions = todayTasks.reduce((sum, t) => sum + t.sessionsComplete, 0);
  const segCount = Math.max(totalSessions, 1);

  let segs = '';
  for (let i = 0; i < Math.min(segCount, 20); i++) {
    segs += `<div class="progress-seg ${i < doneSessions ? 'done' : ''}"></div>`;
  }

  document.getElementById('summary-card').innerHTML = `
    <div class="summary-top">
      <div><div class="summary-stat-label">Tasks today</div><div class="summary-stat-value">${todayTasks.length}</div></div>
      <div><div class="summary-stat-label">Est. time</div><div class="summary-stat-value">${todayTasks.length > 0 ? todayTasks.length * 25 + ' min' : '—'}</div></div>
    </div>
    <div class="progress-bar">${segs}</div>
    <div class="summary-note">${doneSessions} of ${totalSessions} sessions complete</div>
  `;
}

function renderTasks() {
  const list = document.getElementById('task-list');
  let filtered = tasks;
  if (currentFilter === 'due-soon') filtered = tasks.filter(isDueSoon);
  else if (currentFilter === 'not-started') filtered = tasks.filter(isNotStarted);

  list.innerHTML = filtered.map(t => {
    const color = getSubjectColor(t.subject);
    const cssColor = COLOR_MAP[color];
    const status = getStatus(t);
    const total = getTotalSessions(t);
    const remaining = Math.max(0, total - t.sessionsComplete);
    const sched = calcSchedule(t.estimate, t.difficulty, t.dueDate);
    const isExpanded = expandedId === t.id;
    const isDone = t.sessionsComplete >= total;

    let dots = '';
    for (let i = 0; i < 5; i++) {
      dots += `<div class="diff-dot ${i <= t.difficulty ? 'filled' : ''}" style="${i <= t.difficulty ? 'background:' + cssColor : ''}"></div>`;
    }

    return `
      <div class="task-card ${isExpanded ? 'expanded' : ''} ${isDone ? 'complete' : ''}" onclick="toggleExpand('${t.id}')">
        <div class="task-card-top">
          <div class="subject-label"><div class="subject-dot" style="background:${cssColor}"></div>${t.subject}</div>
          <span class="status-badge ${status.cls}">${status.text}</span>
        </div>
        <div class="task-title">${t.title}</div>
        <div class="task-meta">
          <div class="meta-item"><i class="ti ti-calendar-due"></i>${formatDate(t.dueDate)}</div>
          <div class="meta-item"><i class="ti ti-clock"></i>25 min sessions</div>
          <div class="meta-item"><div class="difficulty-dots">${dots}</div></div>
        </div>
        <div class="task-chevron"><i class="ti ti-chevron-right"></i></div>
        <div class="task-expand">
          <div class="expand-inner">
            <div class="task-desc">${t.desc}</div>
            <div class="mini-stats">
              <div class="mini-stat"><div class="mini-stat-label">Started</div><div class="mini-stat-value">${formatDate(t.createdDate)}</div></div>
              <div class="mini-stat"><div class="mini-stat-label">Remaining</div><div class="mini-stat-value">${remaining} sessions</div></div>
              <div class="mini-stat"><div class="mini-stat-label">Total time</div><div class="mini-stat-value">${sched.totalMinutes} min</div></div>
            </div>
            <button class="btn-complete" ${isDone ? 'disabled' : ''} onclick="event.stopPropagation();markComplete('${t.id}')">
              ${isDone ? 'All sessions complete ✓' : 'Mark session complete'}
            </button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleExpand(id) { expandedId = expandedId === id ? null : id; renderTasks(); }

function markComplete(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const total = getTotalSessions(task);
  if (task.sessionsComplete >= total) return;
  task.sessionsComplete++;
  saveTasks();

  const card = document.querySelector(`.task-card[onclick*="${id}"]`);
  if (card) { card.style.animation = 'pulseGreen 0.5s'; setTimeout(() => card.style.animation = '', 500); }

  renderSummary();
  renderTasks();
}

// Navigation
function showScreen(name) {
  const prev = currentScreen;
  currentScreen = name;
  document.querySelectorAll('.screen').forEach(s => {
    const sName = s.id.replace('screen-', '');
    if (sName === name) { s.className = 'screen active'; }
    else { s.className = 'screen hidden-right'; }
  });
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.screen === name));
  document.getElementById('fab').classList.toggle('hide', name !== 'tasks');
}

document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => showScreen(tab.dataset.screen));
});

// Filters
document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    currentFilter = pill.dataset.filter;
    document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p === pill));
    renderTasks();
  });
});

// Add flow
function openAddFlow() {
  flowStep = 1;
  flowData = {};
  document.getElementById('screen-tasks').className = 'screen hidden-left';
  document.getElementById('screen-add').className = 'screen active';
  document.getElementById('fab').classList.add('hide');
  renderFlow();
}

function goBack() {
  if (flowStep > 1) { flowStep--; renderFlow(); }
  else { showScreen('tasks'); }
}

function renderFlow() {
  document.getElementById('step-label').textContent = `Step ${flowStep} of 3`;
  document.getElementById('sb1').className = `step-bar ${flowStep >= 1 ? 'active' : ''}`;
  document.getElementById('sb2').className = `step-bar ${flowStep >= 2 ? 'active' : ''}`;
  document.getElementById('sb3').className = `step-bar ${flowStep >= 3 ? 'active' : ''}`;

  const fc = document.getElementById('flow-content');

  if (flowStep === 1) {
    fc.innerHTML = `
      <h2 class="flow-heading">Add homework</h2>
      <p class="flow-sub">How would you like to add it?</p>
      <div class="method-cards">
        <div class="method-card primary" onclick="showModal()">
          <div class="method-icon"><i class="ti ti-photo-scan"></i></div>
          <div class="method-info">
            <div class="method-title-row"><span class="method-title">Upload screenshot</span><span class="fastest-badge">Fastest</span></div>
            <div class="method-desc">Paste or drag a Satchel One screenshot — Paced reads it for you</div>
          </div>
        </div>
        <div class="method-card" onclick="flowStep=2;renderFlow()">
          <div class="method-icon"><i class="ti ti-edit"></i></div>
          <div class="method-info">
            <div class="method-title-row"><span class="method-title">Add manually</span></div>
            <div class="method-desc">Type in the details yourself</div>
          </div>
        </div>
      </div>
    `;
  } else if (flowStep === 2) {
    const subjects = Object.keys(SUBJECT_COLORS);
    fc.innerHTML = `
      <h2 class="flow-heading">Task details</h2>
      <p class="flow-sub">Enter the homework information</p>
      <div class="form-group">
        <label class="form-label">Subject</label>
        <select class="form-select" id="f-subject">
          <option value="">Select subject</option>
          ${subjects.map(s => `<option value="${s}" ${flowData.subject === s ? 'selected' : ''}>${s}</option>`).join('')}
          <option value="__custom">Other…</option>
        </select>
      </div>
      <div class="form-group" id="custom-subject-group" style="display:none">
        <label class="form-label">Custom subject</label>
        <input class="form-input" id="f-custom-subject" placeholder="e.g. Drama" value="${flowData.customSubject || ''}">
      </div>
      <div class="form-group">
        <label class="form-label">Task name</label>
        <input class="form-input" id="f-title" placeholder="e.g. Essay on photosynthesis" value="${flowData.title || ''}">
      </div>
      <div class="form-group">
        <label class="form-label">Due date</label>
        <input class="form-input" id="f-due" type="date" value="${flowData.dueDate || ''}">
      </div>
      <div class="form-group">
        <label class="form-label">Teacher's time estimate</label>
        <select class="form-select" id="f-estimate">
          <option value="">Select estimate</option>
          ${TIME_OPTIONS.map(o => `<option value="${o.val}" ${flowData.estimate == o.val ? 'selected' : ''}>${o.label}</option>`).join('')}
        </select>
      </div>
      <button class="btn-primary" onclick="submitStep2()">Continue</button>
    `;
    document.getElementById('f-subject').addEventListener('change', function() {
      document.getElementById('custom-subject-group').style.display = this.value === '__custom' ? 'block' : 'none';
    });
    if (flowData.subject === '__custom') document.getElementById('custom-subject-group').style.display = 'block';
  } else if (flowStep === 3) {
    const subj = flowData.subject === '__custom' ? flowData.customSubject : flowData.subject;
    const estLabel = TIME_OPTIONS.find(o => o.val == flowData.estimate)?.label || flowData.estimate + ' min';
    fc.innerHTML = `
      <h2 class="flow-heading">Confirm & rate</h2>
      <p class="flow-sub">How hard is this for you?</p>
      <div class="confirm-card">
        <div class="confirm-row"><span class="confirm-key">Subject</span><span class="confirm-val">${subj}</span></div>
        <div class="confirm-row"><span class="confirm-key">Task</span><span class="confirm-val">${flowData.title}</span></div>
        <div class="confirm-row"><span class="confirm-key">Due</span><span class="confirm-val">${formatDate(flowData.dueDate)}</span></div>
        <div class="confirm-row"><span class="confirm-key">Estimate</span><span class="confirm-val">${estLabel}</span></div>
      </div>
      <div class="diff-selector">
        ${DIFFICULTY_LABELS.map((l, i) => `<button class="diff-btn ${flowData.difficulty === i ? 'active' : ''}" onclick="selectDifficulty(${i})">${l}</button>`).join('')}
      </div>
      <div id="schedule-preview"></div>
      <button class="btn-primary" id="btn-add" onclick="addTask()" ${flowData.difficulty === undefined ? 'disabled' : ''}>Add to Paced →</button>
    `;
    if (flowData.difficulty !== undefined) renderSchedulePreview();
  } else if (flowStep === 4) {
    const subj = flowData.subject === '__custom' ? flowData.customSubject : flowData.subject;
    const sched = calcSchedule(flowData.estimate, flowData.difficulty, flowData.dueDate);
    fc.innerHTML = `
      <div class="success-screen">
        <div class="success-check"><i class="ti ti-check"></i></div>
        <h2 class="success-title">Added to Paced</h2>
        <p class="success-sub">First session: ${sched.startDate.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' })}</p>
        <button class="btn-primary" style="max-width:260px" onclick="showScreen('tasks');renderSummary();renderTasks()">Back to tasks</button>
      </div>
    `;
    document.getElementById('step-label').textContent = '';
  }
}

function submitStep2() {
  const subj = document.getElementById('f-subject').value;
  const title = document.getElementById('f-title').value.trim();
  const due = document.getElementById('f-due').value;
  const est = document.getElementById('f-estimate').value;
  if (!subj || !title || !due || !est) return;
  flowData.subject = subj;
  flowData.title = title;
  flowData.dueDate = due;
  flowData.estimate = parseInt(est);
  if (subj === '__custom') flowData.customSubject = document.getElementById('f-custom-subject').value.trim();
  flowStep = 3;
  renderFlow();
}

function selectDifficulty(i) {
  flowData.difficulty = i;
  document.querySelectorAll('.diff-btn').forEach((b, idx) => b.classList.toggle('active', idx === i));
  document.getElementById('btn-add').disabled = false;
  renderSchedulePreview();
}

function renderSchedulePreview() {
  const sched = calcSchedule(flowData.estimate, flowData.difficulty, flowData.dueDate);
  document.getElementById('schedule-preview').innerHTML = `
    <div class="schedule-preview">
      <div class="schedule-title">Paced schedule</div>
      <div class="schedule-row"><span class="label">Total time</span><span>${sched.totalMinutes} min</span></div>
      <div class="schedule-row"><span class="label">Sessions (25 min each)</span><span>${sched.sessions}</span></div>
      <div class="schedule-row"><span class="label">Start by</span><span>${sched.startDate.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })}</span></div>
    </div>
  `;
}

function addTask() {
  const subj = flowData.subject === '__custom' ? flowData.customSubject : flowData.subject;
  tasks.unshift({
    id: Date.now().toString(),
    subject: subj,
    title: flowData.title,
    desc: '',
    dueDate: flowData.dueDate,
    estimate: flowData.estimate,
    difficulty: flowData.difficulty,
    sessionsComplete: 0,
    createdDate: new Date().toISOString().split('T')[0],
  });
  saveTasks();
  flowStep = 4;
  renderFlow();
}

function showModal() { document.getElementById('modal').classList.add('show'); }
function closeModal() { document.getElementById('modal').classList.remove('show'); }

// Init
function init() {
  const now = new Date();
  document.getElementById('today-date').textContent = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  loadTasks();
  renderSummary();
  renderTasks();
}

init();
</script>
