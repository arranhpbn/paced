<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paced</title>
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@400,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --blue-primary: #3f63f2;
  --blue-dim: #0A1230;
  --blue-faint: #080E28;
  --bg: #06070D;
  --bg2: #0B0E1A;
  --bg3: #0D1020;
  --border: #1A2050;
  --border2: #252A45;
  --ink: #EEF0FF;
  --ink2: #4A5A99;
  --ink3: #252A45;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #FBBF24;
  --orange: #FB923C;
  --purple: #A78BFA;
  --pink: #F472B6;
  --blue: #60A5FA;
}

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Satoshi', sans-serif;
  font-weight: 400;
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, h4 { font-family: 'Cabinet Grotesk', sans-serif; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
button:active { transform: scale(0.97); }
input, select, textarea { font-family: inherit; }

.app {
  display: flex;
  height: 100%;
  position: relative;
  overflow: hidden;
}

.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 16px;
  gap: 4px;
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 12px;
  margin-bottom: 28px;
}

.logo-icon {
  width: 32px; height: 32px;
  background: var(--blue-primary);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #fff;
}

.wordmark {
  font-family: 'Cabinet Grotesk', sans-serif;
  font-weight: 700;
  font-size: 20px;
}

.sidebar-tab {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink2);
  transition: all 0.15s;
  width: 100%;
  text-align: left;
}
.sidebar-tab:hover { color: var(--ink); background: rgba(255,255,255,0.03); }
.sidebar-tab.active { background: var(--blue-faint); color: var(--blue-primary); }
.sidebar-tab i { font-size: 20px; }

.main-area {
  flex: 1;
  min-width: 0;
  height: 100%;
  position: relative;
  overflow: hidden;
}

.screen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 40px 60px;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform, opacity;
}
.screen.hidden-right { transform: translateX(100%); opacity: 0; pointer-events: none; }
.screen.hidden-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
.screen.active { transform: translateX(0); opacity: 1; pointer-events: auto; }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }

@media (min-width: 769px) {
  .topbar .topbar-left { display: none; }
}

.date-label { color: var(--ink2); font-size: 13px; margin-bottom: 4px; }
.main-heading { font-size: 32px; font-weight: 800; margin-bottom: 16px; }

.summary-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 20px;
}
.summary-msg { font-size: 14px; color: var(--ink2); line-height: 1.5; }
.summary-counts { display: flex; gap: 24px; margin-top: 12px; }
.summary-count { display: flex; flex-direction: column; }
.summary-count-val { font-size: 22px; font-weight: 700; font-family: 'Cabinet Grotesk', sans-serif; }
.summary-count-label { font-size: 12px; color: var(--ink2); }

.filters { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.pill {
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--border);
  color: var(--ink2);
  transition: all 0.15s;
}
.pill.active {
  border-color: var(--blue-primary);
  color: var(--blue-primary);
  background: var(--blue-faint);
}

.task-list { display: flex; flex-direction: column; gap: 10px; }

.task-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s;
  animation: slideUp 0.3s ease-out;
}
.task-card:hover { border-color: var(--border2); }
.task-card.done-card {
  opacity: 0.35;
  pointer-events: none;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulseGreen {
  0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
  70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); }
  100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
}

.task-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.subject-label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink2); }
.subject-emoji { font-size: 14px; }

.status-badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 10px; }
.status-today { background: rgba(63,99,242,0.12); color: var(--blue-primary); }
.status-today-overdue { background: rgba(239,68,68,0.12); color: var(--red); }
.status-pastdue { background: rgba(224,123,84,0.12); color: #E07B54; }
.status-start { background: rgba(251,191,36,0.12); color: var(--yellow); }
.status-ontrack { background: rgba(96,165,250,0.12); color: var(--blue); }
.status-done { background: rgba(34,197,94,0.12); color: var(--green); }

.task-title {
  font-family: 'Cabinet Grotesk', sans-serif;
  font-weight: 500;
  font-size: 16px;
  margin-bottom: 12px;
}

.task-dates { display: flex; gap: 24px; margin-bottom: 12px; }
.task-date-group { display: flex; flex-direction: column; }
.task-date-label { font-size: 10px; color: var(--ink2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.task-date-value { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: 18px; }
.task-date-value.start { color: var(--blue-primary); }
.task-date-value.due { color: var(--ink3); font-size: 14px; font-weight: 500; }

.task-meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--ink2); }
.meta-item i { font-size: 14px; }
.difficulty-dots { display: flex; gap: 3px; }
.diff-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink3); }
.diff-dot.filled { background: var(--blue-primary); }

.task-chevron {
  float: right;
  margin-top: -30px;
  color: var(--ink3);
  font-size: 18px;
  transition: transform 0.25s;
}
.task-card.expanded .task-chevron { transform: rotate(90deg); }

.task-expand {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.task-card.expanded .task-expand { max-height: 400px; }

.expand-inner { padding-top: 14px; border-top: 1px solid var(--border); margin-top: 14px; }
.task-desc { font-size: 13px; color: var(--ink2); margin-bottom: 14px; line-height: 1.5; }

.btn-row { display: flex; gap: 8px; }
.btn-outline {
  flex: 1; padding: 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-weight: 600; font-size: 13px;
  color: var(--ink2);
  transition: all 0.15s;
}
.btn-outline:hover { border-color: var(--blue-primary); color: var(--blue-primary); }
.btn-outline.started { border-color: var(--green); color: var(--green); pointer-events: none; }
.btn-outline.overdue-finished { border-color: var(--blue-primary); color: var(--blue-primary); }
.btn-outline.overdue-notfinished { border-color: var(--ink3); color: var(--ink2); }
.btn-fill {
  flex: 1; padding: 10px;
  background: var(--blue-primary);
  border-radius: 10px;
  font-weight: 700; font-size: 13px;
  color: #fff;
  transition: background 0.15s;
}
.btn-fill:hover { background: #5577ff; }
.btn-fill:disabled { background: var(--ink3); cursor: default; color: var(--ink2); }
.btn-fill:disabled:active { transform: none; }

.previous-section { margin-top: 24px; }
.previous-divider {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px; cursor: pointer;
  color: var(--ink2); font-size: 13px; font-weight: 500;
}
.previous-divider::before, .previous-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.previous-divider i { font-size: 14px; transition: transform 0.2s; }
.previous-divider.open i { transform: rotate(180deg); }
.previous-list { display: flex; flex-direction: column; gap: 6px; }
.previous-row {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 12px; border-radius: 8px;
  background: var(--bg2); border: 1px solid var(--border);
  opacity: 0.5; font-size: 13px;
}
.previous-row .subject-emoji { font-size: 12px; }
.previous-row .prev-title { flex: 1; color: var(--ink2); }
.previous-row .prev-date { color: var(--ink3); font-size: 11px; }

/* Calendar */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.cal-nav { display: flex; align-items: center; gap: 12px; }
.cal-nav-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink2); font-size: 18px;
  border: 1px solid var(--border);
  transition: all 0.15s;
}
.cal-nav-btn:hover { border-color: var(--blue-primary); color: var(--blue-primary); }
.cal-range { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: 20px; }
.cal-subtitle { font-size: 13px; color: var(--ink2); margin-bottom: 16px; }

.cal-legend { display: flex; gap: 16px; margin-bottom: 16px; font-size: 12px; color: var(--ink2); }
.cal-legend-item { display: flex; align-items: center; gap: 6px; }
.cal-swatch { width: 24px; height: 10px; border-radius: 5px; }
.cal-swatch.start { border: 1.5px dashed var(--blue-primary); background: transparent; }
.cal-swatch.due { background: var(--blue-primary); }

.cal-scroll { overflow-x: auto; margin: 0 -10px; padding: 0 10px; }
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(90px, 1fr));
  gap: 1px;
  background: var(--border);
  border-radius: 12px;
  overflow: hidden;
  min-width: 630px;
}
.cal-day {
  background: var(--bg2);
  min-height: 280px;
  display: flex;
  flex-direction: column;
}
.cal-day-header {
  padding: 10px 8px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.cal-day-name { font-size: 11px; color: var(--ink2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.cal-day-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600;
  font-family: 'Cabinet Grotesk', sans-serif;
}
.cal-day-num.today { background: var(--blue-primary); color: #fff; }

.cal-events { padding: 6px 4px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
.cal-pill {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cal-pill.start-pill {
  border: 1.5px dashed var(--blue-primary);
  color: var(--blue-primary);
  opacity: 0.7;
  background: transparent;
}
.cal-pill.due-pill {
  background: var(--blue-primary);
  color: #fff;
  font-weight: 700;
}

.cal-summary {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-top: 16px;
}
.cal-summary h3 { font-size: 14px; margin-bottom: 10px; color: var(--ink2); }
.cal-summary-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; }
.cal-chip { padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; }
.cal-chip.start-chip { border: 1.5px dashed var(--blue-primary); color: var(--blue-primary); }
.cal-chip.due-chip { background: var(--blue-primary); color: #fff; }

/* Progress */
.streak-hero {
  background: linear-gradient(135deg, #0A1230, #0D1840);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  text-align: center;
  margin-bottom: 20px;
}
.streak-emoji { font-size: 48px; filter: drop-shadow(0 0 12px rgba(255,160,0,0.4)); margin-bottom: 8px; }
.streak-number { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 800; font-size: 72px; line-height: 1; }
.streak-unit { font-size: 16px; color: var(--ink2); margin-top: 4px; }
.streak-sub { font-size: 13px; color: var(--ink2); margin-top: 8px; }
.streak-best {
  display: inline-block; margin-top: 10px;
  padding: 4px 12px; border-radius: 8px;
  background: rgba(251,191,36,0.12); color: var(--yellow);
  font-size: 12px; font-weight: 500;
}

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}
.stat-card-label { font-size: 12px; color: var(--ink2); margin-bottom: 6px; }
.stat-card-value { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: 24px; }
.stat-delta {
  display: inline-block; font-size: 11px; font-weight: 600;
  padding: 2px 6px; border-radius: 6px; margin-left: 6px;
}
.stat-delta.up { background: rgba(34,197,94,0.12); color: var(--green); }
.stat-delta.down { background: rgba(239,68,68,0.12); color: var(--red); }

.chart-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 20px;
}
.chart-title { font-size: 14px; color: var(--ink2); margin-bottom: 14px; }
.bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
.bar {
  width: 100%; border-radius: 6px 6px 0 0;
  background: var(--border);
  transition: height 0.3s;
}
.bar.current { background: var(--blue-primary); box-shadow: 0 0 12px rgba(63,99,242,0.3); }
.bar-label { font-size: 11px; color: var(--ink2); }

.subject-breakdown { margin-bottom: 20px; }
.subject-breakdown h3 { font-size: 14px; color: var(--ink2); margin-bottom: 12px; }
.subj-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
.subj-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.subj-info { flex: 1; min-width: 0; }
.subj-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.subj-bar-track { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
.subj-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.subj-time { font-size: 12px; color: var(--ink2); white-space: nowrap; }

/* Settings */
.settings-group { margin-bottom: 24px; }
.settings-group h3 { font-size: 14px; color: var(--ink2); margin-bottom: 12px; }
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.setting-label { font-size: 14px; }
.setting-input {
  width: 240px; padding: 8px 12px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; color: var(--ink); font-size: 13px;
  outline: none;
}
.setting-input:focus { border-color: var(--blue-primary); }

.subject-list { display: flex; flex-direction: column; gap: 8px; }
.subject-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.subject-item .subject-emoji { font-size: 18px; }
.subject-item-name { flex: 1; font-size: 14px; }
.subject-item-btn { color: var(--ink2); font-size: 16px; padding: 4px; }
.subject-item-btn:hover { color: var(--ink); }
.btn-add-subject {
  padding: 10px;
  border: 1px dashed var(--border);
  border-radius: 10px;
  color: var(--ink2);
  font-size: 13px;
  text-align: center;
  transition: all 0.15s;
}
.btn-add-subject:hover { border-color: var(--blue-primary); color: var(--blue-primary); }

.popover-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.popover-overlay.show { opacity: 1; pointer-events: auto; }
.popover {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  width: 320px;
}
.popover h3 { font-size: 16px; margin-bottom: 16px; }
.popover .form-group { margin-bottom: 14px; }
.popover-btns { display: flex; gap: 8px; margin-top: 16px; }
.popover-btns button { flex: 1; padding: 10px; border-radius: 10px; font-weight: 600; font-size: 13px; }
.popover-cancel { background: var(--bg3); color: var(--ink2); }
.popover-save { background: var(--blue-primary); color: #fff; }

.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: none;
  padding: 10px 0 max(10px, env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-tab {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  font-size: 10px;
  color: var(--ink3);
  padding: 4px 0;
  transition: color 0.15s;
}
.nav-tab.active { color: var(--blue-primary); }
.nav-tab i { font-size: 22px; }

.fab {
  position: fixed;
  bottom: 32px;
  right: 32px;
  width: 52px; height: 52px;
  background: var(--blue-primary);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: #fff;
  box-shadow: 0 4px 20px rgba(63,99,242,0.3);
  z-index: 101;
  transition: transform 0.15s, box-shadow 0.15s;
}
.fab:hover { box-shadow: 0 6px 28px rgba(63,99,242,0.45); }
.fab:active { transform: scale(0.93); }
.fab.hide { display: none; }

.flow-topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 0;
  position: sticky; top: 0; background: var(--bg); z-index: 10;
}
.back-btn { font-size: 22px; color: var(--ink2); }
.back-btn:hover { color: var(--ink); }
.step-indicator { display: flex; align-items: center; gap: 8px; flex: 1; }
.step-bar { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background 0.25s; }
.step-bar.done, .step-bar.active { background: var(--blue-primary); }
.step-label { font-size: 12px; color: var(--ink2); white-space: nowrap; }

.flow-heading { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.flow-sub { font-size: 14px; color: var(--ink2); margin-bottom: 24px; }

.method-cards { display: flex; flex-direction: column; gap: 12px; }
.method-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px;
  display: flex; align-items: flex-start; gap: 16px;
  cursor: pointer; transition: border-color 0.15s;
}
.method-card:hover { border-color: var(--border2); }
.method-card.primary { border-color: var(--blue-dim); }
.method-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.method-card.primary .method-icon { background: var(--blue-faint); color: var(--blue-primary); }
.method-card:not(.primary) .method-icon { background: var(--bg3); color: var(--ink2); }
.method-info { flex: 1; }
.method-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.method-title { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 500; font-size: 16px; }
.fastest-badge {
  font-size: 10px; font-weight: 500; padding: 2px 8px;
  border-radius: 8px; background: var(--blue-faint); color: var(--blue-primary);
}
.method-desc { font-size: 13px; color: var(--ink2); line-height: 1.4; }

.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 13px; color: var(--ink2); margin-bottom: 6px; font-weight: 500; }
.form-input, .form-select {
  width: 100%; padding: 12px 14px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; color: var(--ink); font-size: 14px;
  outline: none; transition: border-color 0.15s;
  -webkit-appearance: none;
}
.form-input:focus, .form-select:focus { border-color: var(--blue-primary); }
.form-select { cursor: pointer; }
.form-textarea { resize: vertical; min-height: 60px; }

.btn-primary {
  width: 100%; padding: 14px;
  background: var(--blue-primary); color: #fff;
  font-weight: 700; font-size: 15px;
  border-radius: 12px; margin-top: 10px;
}
.btn-primary:hover { background: #5577ff; }
.btn-primary:disabled { background: var(--ink3); cursor: default; }
.btn-primary:disabled:active { transform: none; }

.confirm-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px; margin-bottom: 20px;
}
.confirm-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.confirm-row:last-child { border-bottom: none; }
.confirm-key { font-size: 13px; color: var(--ink2); }
.confirm-val { font-size: 13px; font-weight: 500; }

.diff-selector { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.diff-btn {
  padding: 10px 16px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  background: var(--bg2); border: 1px solid var(--border);
  transition: all 0.15s;
}
.diff-btn.active { border-color: var(--blue-primary); background: var(--blue-faint); color: var(--blue-primary); }

.schedule-preview {
  background: var(--blue-faint); border: 1px solid var(--blue-dim);
  border-radius: 14px; padding: 18px; margin-bottom: 20px;
}
.schedule-title { font-size: 13px; color: var(--blue-primary); font-weight: 500; margin-bottom: 10px; }
.schedule-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
.schedule-row .label { color: var(--ink2); }

.success-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
.success-check {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--blue-faint); color: var(--blue-primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; margin-bottom: 20px;
}
.success-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.success-sub { font-size: 14px; color: var(--ink2); margin-bottom: 30px; }

.upload-area {
  border: 2px dashed var(--border);
  border-radius: 14px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s;
  margin-bottom: 16px;
}
.upload-area:hover { border-color: var(--blue-primary); }
.upload-area i { font-size: 36px; color: var(--ink2); margin-bottom: 8px; }
.upload-area p { font-size: 13px; color: var(--ink2); }
.upload-status { font-size: 13px; color: var(--ink2); margin-bottom: 16px; text-align: center; }

.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
  padding: 20px;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px;
  max-width: 360px; width: 100%; text-align: center;
}
.modal-icon { font-size: 36px; color: var(--blue-primary); margin-bottom: 12px; }
.modal h3 { font-size: 18px; margin-bottom: 8px; }
.modal p { font-size: 13px; color: var(--ink2); margin-bottom: 20px; line-height: 1.5; }
.modal-close {
  padding: 10px 24px; background: var(--bg3);
  border-radius: 10px; font-weight: 500; font-size: 14px;
}

@media (max-width: 768px) {
  .sidebar { display: none; }
  .bottom-nav { display: flex; }
  .screen { padding: 0 20px 100px; max-width: none; }
  .fab { bottom: max(74px, calc(60px + env(safe-area-inset-bottom))); right: 20px; }
  .topbar .topbar-left { display: flex !important; }
}

@media (max-width: 480px) {
  .task-dates { gap: 16px; }
  .task-meta { gap: 10px; }
}

.screen::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<script>
const esc = (s) => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };

const DEFAULT_SUBJECTS = [
  { name: 'Sports Science', emoji: '🏃', color: '#3f63f2' },
  { name: 'Mathematics', emoji: '📐', color: '#A78BFA' },
  { name: 'Physics', emoji: '⚡', color: '#FB923C' },
  { name: 'English', emoji: '📖', color: '#60A5FA' },
  { name: 'Chemistry', emoji: '🧪', color: '#ef4444' },
  { name: 'Biology', emoji: '🧬', color: '#FBBF24' },
  { name: 'History', emoji: '📜', color: '#F472B6' },
  { name: 'Geography', emoji: '🌍', color: '#22c55e' },
  { name: 'Computer Science', emoji: '💻', color: '#60A5FA' },
  { name: 'Art', emoji: '🎨', color: '#FB923C' },
];

const DIFFICULTY_LABELS = ['Easy','OK','Tricky','Hard','Brutal'];
const DIFFICULTY_MULT = [0.8, 1.0, 1.2, 1.5, 2.0];
const TIME_OPTIONS = [
  {label:'15 min',val:15},{label:'30 min',val:30},{label:'45 min',val:45},
  {label:'1 hour',val:60},{label:'1.5 hours',val:90},{label:'2 hours',val:120},
  {label:'2.5 hours',val:150},{label:'3 hours',val:180},{label:'3+ hours',val:210},
];

let subjects = [];
let tasks = [];
let history = [];
let streak = { current: 0, best: 0, lastDate: null };
let currentFilter = 'all';
let expandedId = null;
let flowStep = 1;
let flowData = {};
let currentScreen = 'tasks';
let calWeekOffset = 0;
let previousOpen = false;
let editingSubjectIdx = -1;

function loadSubjects() {
  const saved = localStorage.getItem('paced_subjects');
  if (saved) { subjects = JSON.parse(saved); return; }
  subjects = JSON.parse(JSON.stringify(DEFAULT_SUBJECTS));
  saveSubjects();
}
function saveSubjects() { localStorage.setItem('paced_subjects', JSON.stringify(subjects)); }
function getSubject(name) { return subjects.find(s => s.name === name) || { name, emoji: '📚', color: '#3f63f2' }; }

function loadTasks() {
  const saved = localStorage.getItem('paced_tasks');
  if (saved) {
    tasks = JSON.parse(saved);
    let migrated = false;
    tasks.forEach(t => {
      if (t.subject === 'Maths') { t.subject = 'Mathematics'; migrated = true; }
      if ('sessionsComplete' in t) { delete t.sessionsComplete; migrated = true; }
      if (t.started === undefined) { t.started = false; migrated = true; }
      if (t.done === undefined) { t.done = false; migrated = true; }
      if (t.overdueChecked === undefined) { t.overdueChecked = false; migrated = true; }
    });
    if (migrated) saveTasks();
    return;
  }
  const today = new Date();
  const d = (off) => { const x = new Date(today); x.setDate(x.getDate() + off); return x.toISOString().split('T')[0]; };
  tasks = [
    { id:'1', subject:'Sports Science', title:'Coursework draft — Section A', desc:'Write up the methodology section.', dueDate: d(8), estimate:120, difficulty:2, started:false, done:false, overdueChecked:false, createdDate: d(-2) },
    { id:'2', subject:'Mathematics', title:'Sparx Homework — Week 12', desc:'Complete all assigned Sparx tasks.', dueDate: d(3), estimate:60, difficulty:1, started:false, done:false, overdueChecked:false, createdDate: d(-1) },
    { id:'3', subject:'Physics', title:'Waves & Optics booklet pp.14–18', desc:'Answer questions on refraction and diffraction.', dueDate: d(6), estimate:45, difficulty:3, started:false, done:false, overdueChecked:false, createdDate: d(0) },
    { id:'4', subject:'English', title:'Macbeth essay — Act 3 analysis', desc:'Write a 500-word essay on the significance of the banquet scene.', dueDate: d(-2), estimate:90, difficulty:2, started:true, done:false, overdueChecked:false, createdDate: d(-7) },
    { id:'5', subject:'Chemistry', title:'Titration calculations worksheet', desc:'Complete questions 1–12 on acid-base titrations.', dueDate: d(-1), estimate:45, difficulty:1, started:false, done:false, overdueChecked:false, createdDate: d(-5) },
    { id:'6', subject:'History', title:'Cold War timeline poster', desc:'Create an illustrated timeline from 1947 to 1991.', dueDate: d(1), estimate:150, difficulty:2, started:true, done:false, overdueChecked:false, createdDate: d(-4) },
    { id:'7', subject:'Biology', title:'Cell division diagram labels', desc:'Label all stages of mitosis and meiosis on the provided diagrams.', dueDate: d(10), estimate:30, difficulty:0, started:false, done:false, overdueChecked:false, createdDate: d(0) },
    { id:'8', subject:'Geography', title:'River Tees case study notes', desc:'Summarise the upper, middle and lower course features.', dueDate: d(-3), estimate:60, difficulty:1, started:true, done:true, overdueChecked:false, createdDate: d(-8) },
  ];
  saveTasks();
}
function saveTasks() { localStorage.setItem('paced_tasks', JSON.stringify(tasks)); }

function loadHistory() {
  const saved = localStorage.getItem('paced_history');
  history = saved ? JSON.parse(saved) : [];
}
function saveHistory() { localStorage.setItem('paced_history', JSON.stringify(history)); }

function loadStreak() {
  const saved = localStorage.getItem('paced_streak');
  if (saved) { streak = JSON.parse(saved); return; }
  streak = { current: 0, best: 0, lastDate: null };
}
function saveStreak() { localStorage.setItem('paced_streak', JSON.stringify(streak)); }

function updateStreak() {
  const todayStr = new Date().toISOString().split('T')[0];
  if (streak.lastDate === todayStr) return;
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = yesterday.toISOString().split('T')[0];
  if (streak.lastDate === yesterdayStr) {
    streak.current++;
  } else {
    streak.current = 1;
  }
  streak.lastDate = todayStr;
  if (streak.current > streak.best) streak.best = streak.current;
  saveStreak();
}

function calcSchedule(estimate, diffIdx, dueDate) {
  const totalMinutes = Math.round(estimate * DIFFICULTY_MULT[diffIdx]);
  const due = new Date(dueDate);
  const daysNeeded = Math.ceil(totalMinutes / 60) + 1;
  const start = new Date(due);
  start.setDate(start.getDate() - daysNeeded);
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0,0,0,0);
  if (start < tomorrow) start.setTime(tomorrow.getTime());
  return { totalMinutes, startDate: start };
}

function getStartDate(task) {
  return calcSchedule(task.estimate, task.difficulty, task.dueDate).startDate;
}

function formatDate(str) {
  return new Date(str).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function formatTime(mins) {
  if (mins < 60) return '~' + mins + ' min';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m > 0 ? '~' + h + 'h ' + m + 'm' : '~' + h + ' hrs';
}

function getStatus(task) {
  if (task.done) return { text: 'Done', cls: 'status-done' };
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(getStartDate(task)); start.setHours(0,0,0,0);
  const due = new Date(task.dueDate); due.setHours(0,0,0,0);
  if (today > due) return { text: 'Past due', cls: 'status-pastdue' };
  if (today >= start) return { text: 'Start today', cls: 'status-today' };
  const daysUntilStart = Math.ceil((start - today) / 86400000);
  if (daysUntilStart <= 3) {
    const dayName = start.toLocaleDateString('en-GB', { weekday: 'short' });
    return { text: 'Start by ' + dayName, cls: 'status-start' };
  }
  return { text: 'On track', cls: 'status-ontrack' };
}

function isDueSoon(task) {
  const due = new Date(task.dueDate);
  const today = new Date(); today.setHours(0,0,0,0);
  return (due - today) / 86400000 <= 3 && !task.done;
}
function isNotStarted(task) { return !task.started && !task.done; }

function renderSummary() {
  const today = new Date(); today.setHours(0,0,0,0);
  const weekAhead = new Date(today); weekAhead.setDate(weekAhead.getDate() + 7);
  const active = tasks.filter(t => !t.done);
  const startToday = active.filter(t => { const s = new Date(getStartDate(t)); s.setHours(0,0,0,0); return s <= today; });
  const thisWeek = active.filter(t => { const s = new Date(getStartDate(t)); s.setHours(0,0,0,0); return s <= weekAhead; });

  const msg = startToday.length === 0
    ? "You're ahead — nothing to start today"
    : startToday.length === 1
    ? '1 task needs your attention today'
    : startToday.length + ' tasks need your attention today';

  document.getElementById('summary-card').innerHTML =
    '<div class="summary-msg">' + esc(msg) + '</div>' +
    '<div class="summary-counts">' +
      '<div class="summary-count"><span class="summary-count-val">' + startToday.length + '</span><span class="summary-count-label">Start today</span></div>' +
      '<div class="summary-count"><span class="summary-count-val">' + thisWeek.length + '</span><span class="summary-count-label">This week</span></div>' +
    '</div>';
}

function renderTasks() {
  const list = document.getElementById('task-list');
  let filtered = tasks;
  if (currentFilter === 'due-soon') filtered = tasks.filter(isDueSoon);
  else if (currentFilter === 'not-started') filtered = tasks.filter(isNotStarted);

  const todayStr = new Date().toISOString().split('T')[0];
  const active = filtered.filter(t => !t.done);
  const doneNotYetDue = filtered.filter(t => t.done && t.dueDate >= todayStr);
  const previous = filtered.filter(t => t.done && t.dueDate < todayStr);

  let html = '';

  active.forEach(t => {
    const subj = getSubject(t.subject);
    const status = getStatus(t);
    const sched = calcSchedule(t.estimate, t.difficulty, t.dueDate);
    const startStr = sched.startDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    const isExpanded = expandedId === t.id;
    const isPastDue = new Date(t.dueDate) < new Date(todayStr) && !t.done;
    const needsCheck = isPastDue && !t.overdueChecked;

    let dots = '';
    for (let i = 0; i < 5; i++) dots += '<div class="diff-dot ' + (i <= t.difficulty ? 'filled' : '') + '"></div>';

    let actionsHtml;
    if (needsCheck) {
      actionsHtml =
        '<div class="btn-row">' +
          '<button class="btn-outline overdue-finished" onclick="event.stopPropagation();markFinished(\'' + esc(t.id) + '\')">Finished</button>' +
          '<button class="btn-outline overdue-notfinished" onclick="event.stopPropagation();markNotFinished(\'' + esc(t.id) + '\')">Not finished</button>' +
        '</div>';
    } else if (isPastDue && t.overdueChecked) {
      actionsHtml =
        '<div class="btn-row">' +
          '<button class="btn-fill" onclick="event.stopPropagation();markDone(\'' + esc(t.id) + '\')">Mark as done</button>' +
        '</div>';
    } else {
      actionsHtml =
        '<div class="btn-row">' +
          '<button class="btn-outline ' + (t.started ? 'started' : '') + '" onclick="event.stopPropagation();markStarted(\'' + esc(t.id) + '\')">' + (t.started ? '✓ Started' : 'Mark as started') + '</button>' +
          '<button class="btn-fill" ' + (!t.started ? 'disabled' : '') + ' onclick="event.stopPropagation();markDone(\'' + esc(t.id) + '\')">Mark as done</button>' +
        '</div>';
    }

    html +=
      '<div class="task-card ' + (isExpanded || needsCheck ? 'expanded' : '') + '" data-id="' + esc(t.id) + '" onclick="toggleExpand(\'' + esc(t.id) + '\')">' +
        '<div class="task-card-top">' +
          '<div class="subject-label"><span class="subject-emoji">' + esc(subj.emoji) + '</span>' + esc(t.subject) + '</div>' +
          '<span class="status-badge ' + status.cls + '">' + esc(status.text) + '</span>' +
        '</div>' +
        '<div class="task-title">' + esc(t.title) + '</div>' +
        '<div class="task-dates">' +
          '<div class="task-date-group"><span class="task-date-label">Start by</span><span class="task-date-value start">' + esc(startStr) + '</span></div>' +
          '<div class="task-date-group"><span class="task-date-label">Due</span><span class="task-date-value due">' + esc(formatDate(t.dueDate)) + '</span></div>' +
        '</div>' +
        '<div class="task-meta">' +
          '<div class="meta-item"><div class="difficulty-dots">' + dots + '</div></div>' +
          '<div class="meta-item"><i class="ti ti-clock"></i>' + esc(formatTime(sched.totalMinutes)) + '</div>' +
        '</div>' +
        '<div class="task-chevron"><i class="ti ti-chevron-right"></i></div>' +
        '<div class="task-expand"><div class="expand-inner">' +
          (t.desc ? '<div class="task-desc">' + esc(t.desc) + '</div>' : '') +
          actionsHtml +
        '</div></div>' +
      '</div>';
  });

  doneNotYetDue.forEach(t => {
    const subj = getSubject(t.subject);
    html +=
      '<div class="task-card done-card">' +
        '<div class="task-card-top">' +
          '<div class="subject-label"><span class="subject-emoji">' + esc(subj.emoji) + '</span>' + esc(t.subject) + '</div>' +
          '<span class="status-badge status-done">Done</span>' +
        '</div>' +
        '<div class="task-title">' + esc(t.title) + '</div>' +
      '</div>';
  });

  if (previous.length > 0) {
    html +=
      '<div class="previous-section">' +
        '<div class="previous-divider ' + (previousOpen ? 'open' : '') + '" onclick="previousOpen=!previousOpen;renderTasks()">' +
          'Previous (' + previous.length + ') <i class="ti ti-chevron-down"></i>' +
        '</div>' +
        (previousOpen ? '<div class="previous-list">' + previous.map(t => {
          const subj = getSubject(t.subject);
          return '<div class="previous-row"><span class="subject-emoji">' + esc(subj.emoji) + '</span><span class="prev-title">' + esc(t.title) + '</span><span class="prev-date">' + esc(formatDate(t.dueDate)) + '</span></div>';
        }).join('') + '</div>' : '') +
      '</div>';
  }

  list.innerHTML = html;
}

function toggleExpand(id) { expandedId = expandedId === id ? null : id; renderTasks(); }

function markStarted(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || task.started) return;
  task.started = true;
  saveTasks();
  renderTasks();
}

function markDone(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || task.done) return;
  if (!task.started && !task.overdueChecked) return;
  task.done = true;
  saveTasks();
  updateStreak();

  history.push({
    taskId: task.id,
    subject: task.subject,
    estimate: task.estimate,
    difficulty: task.difficulty,
    doneDate: new Date().toISOString().split('T')[0],
  });
  saveHistory();
  renderSummary();

  const card = document.querySelector('.task-card[data-id="' + id + '"]');
  if (card) {
    card.style.animation = 'pulseGreen 0.5s';
    setTimeout(() => { expandedId = null; renderTasks(); if (currentScreen === 'calendar') renderCalendar(); }, 500);
  } else {
    expandedId = null;
    renderTasks();
    if (currentScreen === 'calendar') renderCalendar();
  }
}

function markFinished(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || task.done) return;
  task.done = true;
  task.started = true;
  saveTasks();
  updateStreak();

  history.push({
    taskId: task.id,
    subject: task.subject,
    estimate: task.estimate,
    difficulty: task.difficulty,
    doneDate: new Date().toISOString().split('T')[0],
  });
  saveHistory();
  renderSummary();

  const card = document.querySelector('.task-card[data-id="' + id + '"]');
  if (card) {
    card.style.animation = 'pulseGreen 0.5s';
    setTimeout(() => { expandedId = null; renderTasks(); if (currentScreen === 'calendar') renderCalendar(); }, 500);
  } else {
    expandedId = null;
    renderTasks();
    if (currentScreen === 'calendar') renderCalendar();
  }
}

function markNotFinished(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.overdueChecked = true;
  saveTasks();
  renderTasks();
}

function showScreen(name) {
  currentScreen = name;
  document.querySelectorAll('.screen').forEach(s => {
    const sName = s.id.replace('screen-', '');
    s.className = sName === name ? 'screen active' : 'screen hidden-right';
  });
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.screen === name));
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.dataset.screen === name));
  document.getElementById('fab').classList.toggle('hide', name !== 'tasks');
  if (name === 'calendar') renderCalendar();
  if (name === 'progress') renderProgress();
  if (name === 'settings') renderSettings();
}

document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => showScreen(tab.dataset.screen));
});
document.querySelectorAll('.sidebar-tab').forEach(tab => {

});
document.querySelectorAll('.pill').forEach(pill => {

function renderCalendar() {
  const container = document.getElementById('calendar-content');
  const activeTasks = tasks.filter(t => !t.done);
  const today = new Date(); today.setHours(0,0,0,0);
  const weekStart = new Date(today);
  const day = weekStart.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  weekStart.setDate(weekStart.getDate() + diff + calWeekOffset * 7);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);

  const fmt = (d) => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  const rangeLabel = fmt(weekStart) + ' — ' + fmt(weekEnd);
  let subtitle = '';
  if (calWeekOffset === 0) subtitle = 'This week';
  else if (calWeekOffset === 1) subtitle = 'Next week';
  else if (calWeekOffset === -1) subtitle = 'Last week';
  else subtitle = calWeekOffset > 0 ? calWeekOffset + ' weeks ahead' : Math.abs(calWeekOffset) + ' weeks ago';

  const startMap = {};
  const dueMap = {};
  activeTasks.forEach(t => {
    const sDate = new Date(getStartDate(t)); sDate.setHours(0,0,0,0);
    const sKey = sDate.toISOString().split('T')[0];
    if (!startMap[sKey]) startMap[sKey] = [];
    startMap[sKey].push(t);
    const dKey = t.dueDate;
    if (!dueMap[dKey]) dueMap[dKey] = [];
    dueMap[dKey].push(t);
  });

  let daysHtml = '';
  const todayStr = today.toISOString().split('T')[0];
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const weekTasks = new Set();

  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart); d.setDate(d.getDate() + i);
    const dStr = d.toISOString().split('T')[0];
    const isToday = dStr === todayStr;
    const starts = startMap[dStr] || [];
    const dues = dueMap[dStr] || [];

    let eventsHtml = '';
    starts.forEach(t => {
      weekTasks.add(t.id);
      const subj = getSubject(t.subject);
      eventsHtml += '<div class="cal-pill start-pill" title="' + esc(t.title) + '">' + esc(subj.emoji) + ' ' + esc(t.title) + '</div>';
    });
    dues.forEach(t => {
      weekTasks.add(t.id);
      const subj = getSubject(t.subject);
      eventsHtml += '<div class="cal-pill due-pill" title="' + esc(t.title) + '">' + esc(subj.emoji) + ' ' + esc(t.title) + '</div>';
    });

    daysHtml +=
      '<div class="cal-day">' +
        '<div class="cal-day-header">' +
          '<div class="cal-day-name">' + dayNames[i] + '</div>' +
          '<div class="cal-day-num ' + (isToday ? 'today' : '') + '">' + d.getDate() + '</div>' +
        '</div>' +
        '<div class="cal-events">' + (eventsHtml || '<div style="color:var(--ink3);font-size:11px;text-align:center;padding-top:20px">—</div>') + '</div>' +
      '</div>';
  }

  const weekTasksList = activeTasks.filter(t => weekTasks.has(t.id));
  let summaryHtml = '';
  if (weekTasksList.length > 0) {
    const ws = weekStart.toISOString().split('T')[0];
    const we = weekEnd.toISOString().split('T')[0];
    summaryHtml = '<div class="cal-summary"><h3>This week\'s tasks</h3>';
    weekTasksList.forEach(t => {
      const subj = getSubject(t.subject);
      const sDate = new Date(getStartDate(t)); sDate.setHours(0,0,0,0);
      const sKey = sDate.toISOString().split('T')[0];
      let chips = '';
      if (sKey >= ws && sKey <= we) chips += '<span class="cal-chip start-chip">Start ' + formatDate(sKey) + '</span>';
      if (t.dueDate >= ws && t.dueDate <= we) chips += '<span class="cal-chip due-chip">Due ' + formatDate(t.dueDate) + '</span>';
      summaryHtml += '<div class="cal-summary-row"><span class="subject-emoji">' + esc(subj.emoji) + '</span> ' + esc(t.title) + ' ' + chips + '</div>';
    });
    summaryHtml += '</div>';
  }

  container.innerHTML =
    '<h1 class="main-heading">Calendar</h1>' +
    '<div class="cal-header"><div class="cal-nav">' +
      '<button class="cal-nav-btn" onclick="calWeekOffset--;renderCalendar()"><i class="ti ti-chevron-left"></i></button>' +
      '<span class="cal-range">' + esc(rangeLabel) + '</span>' +
      '<button class="cal-nav-btn" onclick="calWeekOffset++;renderCalendar()"><i class="ti ti-chevron-right"></i></button>' +
    '</div></div>' +
    '<div class="cal-subtitle">' + esc(subtitle) + '</div>' +
    '<div class="cal-legend">' +
      '<div class="cal-legend-item"><div class="cal-swatch start"></div>Start reminder</div>' +
      '<div class="cal-legend-item"><div class="cal-swatch due"></div>Due date</div>' +
    '</div>' +
    '<div class="cal-scroll"><div class="cal-grid">' + daysHtml + '</div></div>' +
    summaryHtml;
}

function renderProgress() {
  const container = document.getElementById('progress-content');
  const todayStr = new Date().toISOString().split('T')[0];
  const now = new Date();

  const streakSub = streak.lastDate === todayStr ? 'Last active today' : streak.lastDate ? 'Last active ' + formatDate(streak.lastDate) : 'Complete a task to start';

  const totalDone = history.length;
  const totalMinutes = history.reduce((s, h) => s + Math.round(h.estimate * DIFFICULTY_MULT[h.difficulty]), 0);
  const totalHours = (totalMinutes / 60).toFixed(1);

  let onTimeCount = 0;
  history.forEach(h => {
    const task = tasks.find(t => t.id === h.taskId);
    if (task && task.started) onTimeCount++;
  });
  const onTimePct = totalDone > 0 ? Math.round((onTimeCount / totalDone) * 100) : 0;

  const weekStart = new Date(); weekStart.setHours(0,0,0,0);
  const dayOfWeek = weekStart.getDay();
  weekStart.setDate(weekStart.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
  const weekStartStr = weekStart.toISOString().split('T')[0];
  const thisWeekDone = history.filter(h => h.doneDate >= weekStartStr).length;

  const thisMonthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
  const lastMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString().split('T')[0];
  const thisMonthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];
  const lastMonthEnd = new Date(now.getFullYear(), now.getMonth(), 0).toISOString().split('T')[0];
  const thisMonthCount = history.filter(h => h.doneDate >= thisMonthStart && h.doneDate <= thisMonthEnd).length;
  const lastMonthCount = history.filter(h => h.doneDate >= lastMonthStart && h.doneDate <= lastMonthEnd).length;
  const monthDelta = thisMonthCount - lastMonthCount;
  const deltaHtml = monthDelta !== 0 ? '<span class="stat-delta ' + (monthDelta > 0 ? 'up' : 'down') + '">' + (monthDelta > 0 ? '+' : '') + monthDelta + '</span>' : '';

  let barHtml = '';
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const m = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const mStart = m.toISOString().split('T')[0];
    const mEnd = new Date(m.getFullYear(), m.getMonth() + 1, 0).toISOString().split('T')[0];
    const count = history.filter(h => h.doneDate >= mStart && h.doneDate <= mEnd).length;
    months.push({ label: m.toLocaleDateString('en-GB', { month: 'short' }), count, current: i === 0 });
  }
  const maxCount = Math.max(...months.map(m => m.count), 1);
  months.forEach(m => {
    const pct = Math.max((m.count / maxCount) * 100, 4);
    barHtml += '<div class="bar-col"><div class="bar ' + (m.current ? 'current' : '') + '" style="height:' + pct + '%"></div><div class="bar-label">' + esc(m.label) + '</div></div>';
  });

  const subjMap = {};
  history.forEach(h => {
    if (!subjMap[h.subject]) subjMap[h.subject] = 0;
    subjMap[h.subject] += Math.round(h.estimate * DIFFICULTY_MULT[h.difficulty]);
  });
  const subjEntries = Object.entries(subjMap).sort((a, b) => b[1] - a[1]);
  const maxSubjTime = subjEntries.length > 0 ? subjEntries[0][1] : 1;
  let subjHtml = '';
  subjEntries.forEach(([name, mins]) => {
    const subj = getSubject(name);
    const pct = (mins / maxSubjTime) * 100;
    const timeStr = mins >= 60 ? Math.floor(mins/60) + 'h ' + (mins%60 > 0 ? mins%60 + 'm' : '') : mins + 'm';
    subjHtml +=
      '<div class="subj-row">' +
        '<div class="subj-icon" style="background:' + subj.color + '22">' + esc(subj.emoji) + '</div>' +
        '<div class="subj-info"><div class="subj-name">' + esc(name) + '</div><div class="subj-bar-track"><div class="subj-bar-fill" style="width:' + pct + '%;background:' + subj.color + '"></div></div></div>' +
        '<div class="subj-time">' + esc(timeStr) + '</div>' +
      '</div>';
  });

  container.innerHTML =
    '<div class="streak-hero">' +
      '<div class="streak-emoji">🔥</div>' +
      '<div class="streak-number">' + streak.current + '</div>' +
      '<div class="streak-unit">day' + (streak.current !== 1 ? 's' : '') + '</div>' +
      '<div class="streak-sub">' + esc(streakSub) + '</div>' +
      (streak.best > 0 ? '<div class="streak-best">🏆 Best: ' + streak.best + ' days</div>' : '') +
    '</div>' +
    '<div class="stat-grid">' +
      '<div class="stat-card"><div class="stat-card-label">Tasks done</div><div class="stat-card-value">' + totalDone + deltaHtml + '</div></div>' +
      '<div class="stat-card"><div class="stat-card-label">Time put in</div><div class="stat-card-value">' + totalHours + 'h</div></div>' +
      '<div class="stat-card"><div class="stat-card-label">On time starts</div><div class="stat-card-value">' + onTimePct + '%</div></div>' +
      '<div class="stat-card"><div class="stat-card-label">This week</div><div class="stat-card-value">' + thisWeekDone + '</div></div>' +
    '</div>' +
    '<div class="chart-section"><div class="chart-title">Monthly completions</div><div class="bar-chart">' + barHtml + '</div></div>' +
    (subjEntries.length > 0 ? '<div class="subject-breakdown"><h3>Subject breakdown</h3>' + subjHtml + '</div>' : '');
}

function addSubject() {
  editingSubjectIdx = -1;
  document.getElementById('popover-title').textContent = 'Add subject';
  document.getElementById('pop-emoji').value = '';
  document.getElementById('pop-name').value = '';
  document.getElementById('pop-color').value = '#3f63f2';
  document.getElementById('subject-popover').classList.add('show');
}
function editSubject(i) {
  editingSubjectIdx = i;
  const s = subjects[i];
  document.getElementById('popover-title').textContent = 'Edit subject';
  document.getElementById('pop-emoji').value = s.emoji;
  document.getElementById('pop-name').value = s.name;
  document.getElementById('pop-color').value = s.color;
  document.getElementById('subject-popover').classList.add('show');
}
function closeSubjectPopover() { document.getElementById('subject-popover').classList.remove('show'); }
function saveSubjectPopover() {
  const emoji = document.getElementById('pop-emoji').value.trim() || '📚';
  const name = document.getElementById('pop-name').value.trim();
  const color = document.getElementById('pop-color').value;
  if (!name) return;
  if (editingSubjectIdx >= 0) {
    const oldName = subjects[editingSubjectIdx].name;
    subjects[editingSubjectIdx] = { name, emoji, color };
    if (oldName !== name) tasks.forEach(t => { if (t.subject === oldName) t.subject = name; });
    saveTasks();
  } else {
    subjects.push({ name, emoji, color });
  }
  saveSubjects();
  closeSubjectPopover();
  renderSettings();
}
function deleteSubject(i) {
  if (!confirm('Delete ' + subjects[i].name + '?')) return;
  subjects.splice(i, 1);
  saveSubjects();
  renderSettings();
}

function submitStep2() {
  const subj = document.getElementById('f-subject').value;

  const due = document.getElementById('f-due').value;

function addTask() {
  tasks.unshift({
    id: Date.now().toString(),
    subject: flowData.subject,
    title: flowData.title,
    desc: flowData.desc || '',
    dueDate: flowData.dueDate,
    estimate: flowData.estimate,
    difficulty: flowData.difficulty,
    started: false,
    done: false,
    createdDate: new Date().toISOString().split('T')[0],
  });
  saveTasks();
  flowStep = 4;
  renderFlow();
}

function startUpload() {
  document.getElementById('file-input').click();
}

document.getElementById('file-input').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const reader = new FileReader();
  reader.onload = async function(ev) {
    const base64 = ev.target.result.split(',')[1];
    const mediaType = file.type || 'image/png';

    flowStep = 2;
    const fc = document.getElementById('flow-content');
    fc.innerHTML = '<div class="upload-status"><i class="ti ti-loader" style="animation:spin 1s linear infinite;display:inline-block"></i> Reading screenshot with Claude...</div>';

    if (!document.getElementById('spin-style')) {
      const style = document.createElement('style');
      style.id = 'spin-style';
      style.textContent = '@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}';
      document.head.appendChild(style);
    }

    try {
      const resp = await fetch('/api/parse-screenshot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ imageBase64: base64, mediaType })
      });
      if (!resp.ok) throw new Error('API error: ' + resp.status);
      const data = await resp.json();
      const text = data.content[0].text;
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('Could not parse response');
      const parsed = JSON.parse(match[0]);

      flowData.subject = parsed.subject || '';
      flowData.title = parsed.title || '';
      flowData.desc = parsed.desc || '';
      flowData.dueDate = parsed.dueDate || '';
      flowData.estimate = parsed.estimate || 60;

      const matchingSubj = subjects.find(s => s.name.toLowerCase() === (flowData.subject || '').toLowerCase());
      if (matchingSubj) flowData.subject = matchingSubj.name;

      renderFlow();
    } catch (err) {
      showModalMsg('Upload failed', err.message);
      flowStep = 1;
      renderFlow();
    }
  };
  reader.readAsDataURL(file);
});

function showModalMsg(title, msg) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

function init() {
  const now = new Date();
  document.getElementById('today-date').textContent = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  loadSubjects();
  loadTasks();
  loadHistory();
  loadStreak();
  renderSummary();
  renderTasks();
}

init();
</script>
